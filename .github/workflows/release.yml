name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, name: nerve, archive: tar.gz }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, name: nerve, archive: tar.gz }
          - { os: macos-latest, target: x86_64-apple-darwin, name: nerve, archive: tar.gz }
          - { os: macos-latest, target: aarch64-apple-darwin, name: nerve, archive: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, name: nerve.exe, archive: zip }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: ${{ matrix.target }} }
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxdo-dev libxtst-dev libxcb1-dev libdbus-1-dev pkg-config
      - name: Build
        working-directory: core
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        working-directory: core/target/${{ matrix.target }}/release
        shell: bash
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a ../../../nerve-${{ github.ref_name }}-${{ matrix.target }}.zip ${{ matrix.name }}
          else
            tar czf ../../../nerve-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.name }}
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            core/target/nerve-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            core/target/nerve-${{ github.ref_name }}-${{ matrix.target }}.zip
